name: Deploy trpg-tools

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-trpg-tools
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.4
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Nuxt app
        run: pnpm build

  deploy:
    name: Deploy to VPS
    runs-on: [self-hosted, Linux, X64, trpg-tools-deploy]
    needs: build
    if: github.ref == 'refs/heads/master'
    env:
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/root/trpg-tools' }}
      DEPLOY_PM2_NAME: ${{ secrets.DEPLOY_PM2_NAME || 'trpg-tools' }}
      DEPLOY_PORT_APP: ${{ secrets.DEPLOY_PORT_APP || '3000' }}

    steps:
      - name: Deploy locally on target server
        run: |
          set -euo pipefail

          APP_DIR="$DEPLOY_PATH"
          APP_NAME="$DEPLOY_PM2_NAME"
          APP_PORT="$DEPLOY_PORT_APP"

          if [ ! -d "$APP_DIR/.git" ]; then
            echo "Repository is not checked out at $APP_DIR"
            exit 1
          fi

          cd "$APP_DIR"
          git fetch origin master
          git reset --hard origin/master

          corepack enable
          pnpm install --frozen-lockfile
          pnpm build

          if systemctl list-unit-files trpg-tools.service >/dev/null 2>&1; then
            systemctl restart trpg-tools.service
            systemctl is-active --quiet trpg-tools.service
          elif command -v pm2 >/dev/null 2>&1; then
            PORT="$APP_PORT" pm2 start .output/server/index.mjs --name "$APP_NAME" --update-env ||             PORT="$APP_PORT" pm2 restart "$APP_NAME" --update-env
            pm2 save
          else
            echo "No supported process manager found. Expected systemd trpg-tools.service or pm2."
            exit 1
          fi
