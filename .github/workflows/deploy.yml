name: Deploy trpg-tools

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-trpg-tools
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.4
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Nuxt app
        run: pnpm build

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master'
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
      DEPLOY_PM2_NAME: ${{ secrets.DEPLOY_PM2_NAME || 'trpg-tools' }}
      DEPLOY_PORT_APP: ${{ secrets.DEPLOY_PORT_APP || '3000' }}

    steps:
      - name: Check deploy secret configuration
        id: config
        run: |
          if [ -z "$DEPLOY_HOST" ] || [ -z "$DEPLOY_USER" ] || [ -z "$DEPLOY_SSH_KEY" ] || [ -z "$DEPLOY_PATH" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "VPS deploy skipped: set DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY, and DEPLOY_PATH repository secrets to enable deployment."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy over SSH
        if: steps.config.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ env.DEPLOY_SSH_KEY }}
          port: ${{ env.DEPLOY_PORT }}
          script_stop: true
          timeout: 90s
          command_timeout: 20m
          script: |
            set -euo pipefail

            APP_DIR="${{ env.DEPLOY_PATH }}"
            APP_NAME="${{ env.DEPLOY_PM2_NAME }}"
            APP_PORT="${{ env.DEPLOY_PORT_APP }}"

            if [ ! -d "$APP_DIR/.git" ]; then
              echo "Repository is not checked out at $APP_DIR"
              echo "Create it once on the server, e.g.:"
              echo "  git clone https://github.com/nihilapp/trpg-tools.git $APP_DIR"
              exit 1
            fi

            cd "$APP_DIR"
            git fetch origin master
            git reset --hard origin/master

            corepack enable
            pnpm install --frozen-lockfile
            pnpm build

            if command -v pm2 >/dev/null 2>&1; then
              PORT="$APP_PORT" pm2 start .output/server/index.mjs --name "$APP_NAME" --update-env || \
              PORT="$APP_PORT" pm2 restart "$APP_NAME" --update-env
              pm2 save
            else
              echo "pm2 is not installed on the server. Install pm2 or replace this section with systemd restart."
              exit 1
            fi
